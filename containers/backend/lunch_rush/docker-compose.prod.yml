# Use this on EC2: pull the app image from Docker Hub, no build.
# Run: docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d --scale app=3
# Requires nginx/nginx.conf in this directory (from repo).

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    image: marwansorour08212003/lunch_rush_app:latest
    # No ports: Nginx is the single entry point; scale with --scale app=3
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
